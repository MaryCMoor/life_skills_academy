<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Skills Academy</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/city3d.css">
    <link rel="stylesheet" href="css/locations.css">
    <link rel="stylesheet" href="css/minigames.css">
</head>
<body>
    <!-- Top Bar -->
    <div id="topBar">
    <!-- Current Activity Status (hidden by default) -->
    <div id="currentActivity">
        <div class="activity-text">
            <span class="activity-icon">⏳</span>
            <span id="activityName">Idle</span>
        </div>
        <div class="activity-time" id="activityTime"></div>
    </div>
    
    <!-- Regular Stats -->
    <div class="stat-item">
        <div class="stat-label">Time</div>
        <div class="stat-value time" id="statTime">--:--</div>
    </div>
    <div class="stat-item">
        <div class="stat-label">Day</div>
        <div class="stat-value" id="statDay">---</div>
    </div>
    <div class="stat-item">
        <div class="stat-label">Money</div>
        <div class="stat-value money" id="statMoney">$0</div>
    </div>
    <div class="stat-item">
        <div class="stat-label">Energy</div>
        <div class="stat-value" id="statEnergy">100</div>
        <div class="progress-container">
            <div class="progress-bar high" id="barEnergy" style="width: 100%"></div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-label">Hunger</div>
        <div class="stat-value" id="statHunger">100</div>
        <div class="progress-container">
            <div class="progress-bar high" id="barHunger" style="width: 100%"></div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-label">Health</div>
        <div class="stat-value" id="statHealth">100</div>
        <div class="progress-container">
            <div class="progress-bar high" id="barHealth" style="width: 100%"></div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-label">Happiness</div>
        <div class="stat-value" id="statHappiness">100</div>
        <div class="progress-container">
            <div class="progress-bar high" id="barHappiness" style="width: 100%"></div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-label">Stress</div>
        <div class="stat-value" id="statStress">0</div>
        <div class="progress-container">
            <div class="progress-bar high" id="barStress" style="width: 0%"></div>
        </div>
    </div>
</div>

    
    <!-- Needs Panel (Side) -->
    <div id="needsPanel">
        <h3>Basic Needs</h3>
        
        <div class="need-item">
            <div>
                <span>🍔 Hunger</span>
                <span id="hungerValue" style="font-weight: bold;">100</span>
            </div>
            <div>
                <div id="hungerBar" style="width: 100%; background: #27ae60;"></div>
            </div>
        </div>
        
        <div class="need-item">
            <div>
                <span>⚡ Energy</span>
                <span id="energyValue" style="font-weight: bold;">100</span>
            </div>
            <div>
                <div id="energyBar" style="width: 100%; background: #27ae60;"></div>
            </div>
        </div>
        
        <div class="need-item">
            <div>
                <span>🚿 Hygiene</span>
                <span id="hygieneValue" style="font-weight: bold;">100</span>
            </div>
            <div>
                <div id="hygieneBar" style="width: 100%; background: #27ae60;"></div>
            </div>
        </div>
        
        <div class="need-item">
            <div>
                <span>😊 Happiness</span>
                <span id="happinessValue" style="font-weight: bold;">100</span>
            </div>
            <div>
                <div id="happinessBar" style="width: 100%; background: #27ae60;"></div>
            </div>
        </div>
        
        <div class="need-item">
            <div>
                <span>❤️ Health</span>
                <span id="healthValue" style="font-weight: bold;">100</span>
            </div>
            <div>
                <div id="healthBar" style="width: 100%; background: #27ae60;"></div>
            </div>
        </div>
        
        <div class="need-item">
            <div>
                <span>😰 Stress</span>
                <span id="stressValue" style="font-weight: bold;">0</span>
            </div>
            <div>
                <div id="stressBar" style="width: 0%; background: #27ae60;"></div>
            </div>
        </div>
    </div>
    
    <!-- City 3D View -->
    <div id="cityContainer">
        <canvas id="cityCanvas"></canvas>
        
        <!-- City Controls -->
        <div id="cityControls">
            <button class="control-btn" id="rotateLeft">← Rotate</button>
            <button class="control-btn" id="zoomIn">+ Zoom</button>
            <button class="control-btn" id="zoomOut">- Zoom</button>
            <button class="control-btn" id="rotateRight">Rotate →</button>
        </div>
        
        <!-- Building Tooltip -->
        <div id="buildingTooltip" class="tooltip hidden">
            <div class="tooltip-title">Building Name</div>
            <div class="tooltip-desc">Description</div>
            <div class="tooltip-hint">Click to enter</div>
        </div>
    </div>
    
    <!-- Location Detail View -->
    <div id="locationScreen" class="hidden">
        <div class="location-header">
            <h2 id="locationTitle">Location</h2>
            <button class="btn-back" onclick="backToCity()">← Back to City</button>
        </div>
        <div class="location-content" id="locationContent">
            <!-- Dynamic content loaded here -->
        </div>
    </div>
    
    <!-- Core Scripts -->
    <script src="js/state.js"></script>
    <script src="js/game.js"></script>
    
    <!-- Utility Scripts -->
    <script src="js/utils/ui.js"></script>
    <script src="js/utils/stats.js"></script>
    <script src="js/utils/time.js"></script>
    <script src="js/utils/saveload.js"></script>
    
    <!-- City 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/city3d.js"></script>
    
    <!-- Finance Scripts -->
    <script src="js/finance/taxes.js"></script>
    <script src="js/finance/stocks.js"></script>
    
    <!-- Location Scripts -->
    <script src="js/locations/home.js"></script>
    <script src="js/locations/school.js"></script>
    <script src="js/locations/store.js"></script>
    <script src="js/locations/bank.js"></script>
    <script src="js/locations/jobcenter.js"></script>
    <script src="js/locations/postoffice.js"></script>
    <script src="js/locations/apartments.js"></script>
    <script src="js/locations/college.js"></script>
    
    <!-- Minigame Scripts -->
    <script src="js/minigames/chores.js"></script>
    <script src="js/minigames/cooking.js"></script>
    <script src="js/minigames/laundry.js"></script>
    <script src="js/minigames/checkwriting.js"></script>
</body>
</html>
