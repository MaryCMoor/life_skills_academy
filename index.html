<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Skills Academy</title>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/city3d.css">
    <link rel="stylesheet" href="css/locations.css">
    <link rel="stylesheet" href="css/minigames.css">
</head>
<body>
    <!-- Top Bar (Fixed) -->
    <div id="topBar">
        <div id="gameTime">Loading...</div>
        <div id="gameStats">
            <span id="cashDisplay">$0</span>
            <span id="bankDisplay">Bank: $0</span>
            <span id="gpaDisplay">GPA: 0.0</span>
        </div>
        <div id="gameControls">
            <button onclick="TimeManager.togglePause()" id="pauseBtn">⏸️ Pause</button>
            <button onclick="SaveLoad.saveGame()">💾 Save</button>
            <button onclick="SaveLoad.loadGame()">📁 Load</button>
            <button onclick="showMenu()">📋 Menu</button>
        </div>
    </div>

    <!-- 3D City View -->
    <div id="cityContainer"></div>

    <!-- Location Screen (Overlay) -->
    <div id="locationScreen" style="display:none;">
        <div id="locationHeader">
            <h2 id="locationTitle">Location</h2>
            <button onclick="closeLocation()" class="close-btn">✖ Back to City</button>
        </div>
        <div id="locationContent">
            <!-- Dynamic content loaded here -->
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer"></div>

    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- CRITICAL: Load scripts in exact order -->
    
    <!-- Core System (MUST BE FIRST) -->
    <script src="js/state.js"></script>
    <script src="js/utils/saveload.js"></script>
    <script src="js/utils/time.js"></script>
    <script src="js/utils/ui.js"></script>
    
    <!-- 3D City -->
    <script src="js/city3d.js"></script>
    
    <!-- Location Files -->
    <script src="js/locations/home.js"></script>
    <script src="js/locations/school.js"></script>
    <script src="js/locations/store.js"></script>
    <script src="js/locations/bank.js"></script>
    <script src="js/locations/jobcenter.js"></script>
    <script src="js/locations/postoffice.js"></script>
    <script src="js/locations/apartments.js"></script>
    <script src="js/locations/college.js"></script>
    <script src="js/locations/entertainment.js"></script>
    <script src="js/locations/phone.js"></script>
    
    <!-- Minigame Files -->
    <script src="js/minigames/chores.js"></script>
    <script src="js/minigames/cooking.js"></script>
    <script src="js/minigames/laundry.js"></script>
    <script src="js/minigames/checkwriting.js"></script>
    <script src="js/minigames/entertainment.js"></script>
    
    <!-- Main Game Controller (MUST BE LAST) -->
    <script src="js/game.js"></script>
</body>
</html>
