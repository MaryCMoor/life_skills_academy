<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Skills Academy</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/city3d.css">
    <link rel="stylesheet" href="css/locations.css">
    <link rel="stylesheet" href="css/minigames.css">
</head>
<body>
    <!-- HUD Overlay -->
    <div id="hud">
        <div id="stats">
            <div class="stat-item">
                <span class="stat-label">💵 Cash:</span>
                <span id="statCash">$50.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">📅 Date:</span>
                <span id="statDate">Jan 1, 2020</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⏰ Time:</span>
                <span id="statTime">07:00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">👤 Age:</span>
                <span id="statAge">13</span>
            </div>
        </div>
        
        <div id="controls">
            <button onclick="toggleView()">Switch View</button>
            <button onclick="SaveSystem.saveGame()">💾 Save</button>
            <button onclick="SaveSystem.loadGame()">📁 Load</button>
        </div>
    </div>
    
    <!-- Notification Area -->
    <div id="notifications"></div>
    
    <!-- City 3D View -->
    <div id="city3d-container">
        <canvas id="city3d-canvas"></canvas>
        <div id="city3d-ui">
            <div id="buildingInfo" class="info-panel">
                <h3>Welcome to Life Skills Academy!</h3>
                <p>Click on buildings to visit locations</p>
            </div>
        </div>
    </div>
    
    <!-- Location Detail View -->
    <div id="locationView" style="display: none;">
        <div id="locationHeader">
            <h2 id="locationTitle">Location</h2>
            <button onclick="toggleView()" class="btn-back">← Back to City</button>
        </div>
        <div id="locationContent">
            <!-- Dynamic content loaded here -->
        </div>
    </div>
    
    <!-- Core Scripts -->
    <script src="js/state.js"></script>
    <script src="js/game.js"></script>
    
    <!-- Utility Scripts -->
    <script src="js/utils/ui.js"></script>
    <script src="js/utils/time.js"></script>
    <script src="js/utils/saveload.js"></script>
    
    <!-- City 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/city3d.js"></script>
    
    <!-- Finance Scripts (NEW) -->
    <script src="js/finance/taxes.js"></script>
    <script src="js/finance/stocks.js"></script>
    
    <!-- Location Scripts -->
    <script src="js/locations/home.js"></script>
    <script src="js/locations/school.js"></script>
    <script src="js/locations/store.js"></script>
    <script src="js/locations/bank.js"></script>
    <script src="js/locations/jobcenter.js"></script>
    <script src="js/locations/postoffice.js"></script>
    <script src="js/locations/apartments.js"></script>
    <script src="js/locations/college.js"></script>
    <!-- <script src="js/finance/broker.js"></script>
    
    <!-- Minigame Scripts -->
    <script src="js/minigames/chores.js"></script>
    <script src="js/minigames/cooking.js"></script>
    <script src="js/minigames/laundry.js"></script>
    <script src="js/minigames/checkwriting.js"></script>
</body>
</html>
