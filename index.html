<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Skills Academy</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/city3d.css">
    <link rel="stylesheet" href="css/locations.css">
    <link rel="stylesheet" href="css/minigames.css">
</head>
<body>
    <!-- Top Bar -->
    <div id="topBar">
        <div class="time-section">
            <div class="time-display" id="timeDisplay">Loading...</div>
            <div class="time-controls">
                <button class="time-btn active" id="speed1" onclick="TimeManager.setSpeed(1)">1x</button>
                <button class="time-btn" id="speed3" onclick="TimeManager.setSpeed(3)">3x</button>
                <button class="time-btn" id="speed10" onclick="TimeManager.setSpeed(10)">10x</button>
                <button class="time-btn pause" id="pauseBtn" onclick="TimeManager.togglePause()">⏸</button>
            </div>
        </div>
        
        <div class="stats-section">
            <div class="stat">💵 $<span id="playerCash">50</span></div>
            <div class="stat">👤 Age <span id="playerAge">13</span></div>
            <div class="stat">📚 GPA <span id="playerGpa">3.0</span></div>
        </div>
    </div>
    
    <!-- City 3D View -->
    <div id="cityContainer">
        <canvas id="cityCanvas"></canvas>
        
        <!-- City Controls -->
        <div id="cityControls">
            <button class="control-btn" id="rotateLeft">← Rotate</button>
            <button class="control-btn" id="zoomIn">+ Zoom</button>
            <button class="control-btn" id="zoomOut">- Zoom</button>
            <button class="control-btn" id="rotateRight">Rotate →</button>
        </div>
        
        <!-- Building Tooltip -->
        <div id="buildingTooltip" class="tooltip hidden">
            <div class="tooltip-title">Building Name</div>
            <div class="tooltip-desc">Description</div>
            <div class="tooltip-hint">Click to enter</div>
        </div>
    </div>
    
    <!-- Location Detail View -->
    <div id="locationScreen" class="hidden">
        <div class="location-header">
            <h2 id="locationTitle">Location</h2>
            <button class="btn-back" onclick="backToCity()">← Back to City</button>
        </div>
        <div class="location-content" id="locationContent">
            <!-- Dynamic content loaded here -->
        </div>
    </div>
    
    <!-- Core Scripts -->
    <script src="js/state.js"></script>
    <script src="js/game.js"></script>
    
    <!-- Utility Scripts -->
    <script src="js/utils/ui.js"></script>
    <script src="js/utils/time.js"></script>
    <script src="js/utils/saveload.js"></script>
    
    <!-- City 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/city3d.js"></script>
    
    <!-- Finance Scripts -->
    <script src="js/finance/taxes.js"></script>
    <script src="js/finance/stocks.js"></script>
    
    <!-- Location Scripts -->
    <script src="js/locations/home.js"></script>
    <script src="js/locations/school.js"></script>
    <script src="js/locations/store.js"></script>
    <script src="js/locations/bank.js"></script>
    <script src="js/locations/jobcenter.js"></script>
    <script src="js/locations/postoffice.js"></script>
    <script src="js/locations/apartments.js"></script>
    <script src="js/locations/college.js"></script>
    
    <!-- Minigame Scripts -->
    <script src="js/minigames/chores.js"></script>
    <script src="js/minigames/cooking.js"></script>
    <script src="js/minigames/laundry.js"></script>
    <script src="js/minigames/checkwriting.js"></script>
</body>
</html>
